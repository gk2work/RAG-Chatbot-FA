<!-- Professional Industry-Standard Navbar -->
<header class="professional-navbar">
  
  <!-- Mobile Menu Toggle -->
  <button class="mobile-menu-toggle" 
          (click)="onMobileMenuToggle()" 
          *ngIf="showMobileMenu"
          aria-label="Toggle mobile menu">
    <div class="hamburger-lines">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </button>
  
  <!-- Left Section: Title & Breadcrumbs -->
  <div class="navbar-left">
    <div class="page-header">
      <h1 class="page-title">{{pageTitle}}</h1>
      <nav class="breadcrumb-nav" aria-label="Breadcrumb">
        <ol class="breadcrumb-list">
          <li class="breadcrumb-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9L12 2L21 9V20A2 2 0 0 1 19 22H5A2 2 0 0 1 3 20V9Z"/>
              <polyline points="9,22 9,12 15,12 15,22"/>
            </svg>
            <span>Admin Portal</span>
          </li>
          <li class="breadcrumb-divider">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9,18 15,12 9,6"/>
            </svg>
          </li>
          <li class="breadcrumb-item current" aria-current="page">
            <span>{{pageTitle}}</span>
          </li>
        </ol>
      </nav>
    </div>
  </div>
  
  <!-- Right Section: Actions & User Info -->
  <div class="navbar-right">
    
    <!-- Search Bar (Optional for future) -->
    <div class="search-container">
      <div class="search-input-wrapper">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" 
               placeholder="Search..." 
               class="search-input"
               aria-label="Search">
      </div>
    </div>
    
    <!-- Action Buttons -->
    <div class="action-buttons">
      
      <!-- Refresh Button -->
      <button class="action-btn refresh-btn" 
              (click)="onRefreshClick()" 
              [disabled]="loading"
              [attr.aria-label]="loading ? 'Refreshing data...' : 'Refresh data'"
              data-tooltip="Refresh Data">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" 
             [class.spinning]="loading">
          <polyline points="23,4 23,10 17,10"/>
          <polyline points="1,20 1,14 7,14"/>
          <path d="M20.49,9A9,9,0,0,0,5.64,5.64L1,10M22,14,17.36,18.36A9,9,0,0,1,3.51,15"/>
        </svg>
      </button>
      
      <!-- Notifications -->
      <button class="action-btn notification-btn" 
              aria-label="View notifications"
              data-tooltip="Notifications">
        <div class="notification-wrapper">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8C6 15 3 17 3 17H21S18 15 18 8"/>
            <path d="M13.73 21A2 2 0 0 1 10.27 21"/>
          </svg>
          <div class="notification-badge" *ngIf="todaySessions > 0">
            <span>{{todaySessions > 9 ? '9+' : todaySessions}}</span>
          </div>
        </div>
      </button>
      
      <!-- Settings -->
      <button class="action-btn settings-btn" 
              aria-label="Open settings"
              data-tooltip="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
      
    </div>
    
    <!-- User Profile Dropdown -->
    <div class="user-profile-section">
      <button class="user-profile-btn" aria-label="User menu">
        <div class="user-avatar">
          <span class="user-initials">AD</span>
        </div>
        <div class="user-details">
          <span class="user-name">Admin User</span>
          <span class="user-role">Administrator</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="dropdown-arrow">
          <polyline points="6,9 12,15 18,9"/>
        </svg>
      </button>
    </div>
    
  </div>
  
</header>
